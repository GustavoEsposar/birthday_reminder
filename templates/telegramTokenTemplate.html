<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reminder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        /* BLOCO */
        .email {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center; 
        }

        /* ELEMENTOS */
        .email__logo {
            width: 120px;
            height: auto;
            display: block;
            margin: 10px auto 20px auto;
        }

        .email__title {
            margin-bottom: 10px;
        }

        .email__text {
            font-size: 20px;
            margin-bottom: 15px;
            text-align: left;
        }

        .email__div--today {
            color: #fff;
            background-color: #2292ca;
            border-radius: 15px;
            padding: 10px;
        }

        .email__birthday-list {
            margin-top: 20px;
            padding-left: 25px;
            text-align: left;
            font-size: 20px;
        }

        .email__image {
            max-width: 50%;
            height: auto;
            margin-top: 20px;
        }

        .email__footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="email">

        <h1 class="email__title">Seu Token do Telegram</h1>

        {{Beggining}}


        <div class="email__footer">
            <p>Este é um email automático. Por favor, não responda-o.</p>
        </div>
    </div>
</body>
</html>
